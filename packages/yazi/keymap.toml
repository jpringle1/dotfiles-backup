# keymap.toml
[mgr]
prepend_keymap = [
	# Goto
	{ on = [ "g", "a" ],       run = "cd ~/AppData/Roaming",     desc = "Goto AppData" },
	{ on = [ "g", "r" ],       run = "cd /repos",     desc = "Goto Repos" },
	{ on = [ "g", "s" ],       run = "cd /src",     desc = "Goto /src" },

   	{ on = "j", run = "leave", desc = "Go back to parent" },
   	{ on = ";", run = "enter", desc = "Enter child" },
	{ on = "l", run = "arrow -1", desc = "Move cursor up" },
	{ on = "k", run = "arrow 1",  desc = "Move cursor down" },

	{ on = "J", run = "back",    desc = "Go back to the previous directory" },
	# { on = ":", run = "forward", desc = "Go forward to the next directory" }, #TODO: colon is shell
	{ on = "L", run = "seek -5", desc = "Seek up 5 units in the preview" },
	{ on = "K", run = "seek 5",  desc = "Seek down 5 units in the preview" },
]

[spot]
prepend_keymap = [
    { on = "l", run = "arrow -1", desc = "Move up" },
    { on = "k", run = "arrow 1", desc = "Move down" },
    { on = "j", run = "swipe -1", desc = "Swipe left" },
    { on = ";", run = "swipe 1", desc = "Swipe right" },
]

[input]
prepend_keymap = [
    { on = "j", run = "move -1", desc = "Move back char" },
    { on = ";", run = "move 1", desc = "Move forward char" },
]

[tasks]
prepend_keymap = [
    { on = "l", run = "arrow -1", desc = "Move up" },
    { on = "k", run = "arrow 1", desc = "Move down" },
]

[confirm]
prepend_keymap = [
    { on = "l", run = "arrow -1", desc = "Move up" },
    { on = "k", run = "arrow 1", desc = "Move down" },
]

[help]
prepend_keymap = [
    { on = "l", run = "arrow -1", desc = "Move up" },
    { on = "k", run = "arrow 1", desc = "Move down" },
]
